application:
  subdomain: subwave
  routes:
    - /=http://caddy:80
  public_path:
    - /stream.mp3
    - /stream.opus
    - /api/health
    - /api/now-playing
    - /api/state
    - /api/session
    - /api/request
    - /api/dj
    - /api/themes
    - /api/cover/
    - /api/persona-avatar/
    - /api/schedule
    - /api/onboarding/status
  injects:
    - id: lazycat-admin-api
      on: request
      when:
        - /api/
      do:
        - src: |
            const pub = [
              '/api/health','/api/now-playing','/api/state','/api/session','/api/request',
              '/api/dj','/api/themes','/api/cover/','/api/persona-avatar/','/api/schedule',
              '/api/onboarding/status'
            ];
            const path = ctx.url.pathname || '';
            if (pub.some((p) => path === p || path.startsWith(p))) return;
            const role = String(ctx.headers.get('x-hc-user-role') || '').toUpperCase();
            if (role !== 'ADMIN') return;
            if (ctx.headers.get('authorization')) return;
            ctx.headers.set('authorization', 'Basic YWRtaW46MDI1Njc2');
    - id: lazycat-strip-basic-challenge
      on: response
      when:
        - /api/
      do:
        - src: |
            // Never let the browser show a native Basic Auth dialog for API calls.
            ctx.headers.delete('www-authenticate');
            ctx.headers.delete('WWW-Authenticate');
    - id: subwave-admin-ui
      on: browser
      when:
        - /admin*
        - /onboarding*
      do:
        - src: |
            // LazyCat operators already passed the ingress login gate — hide the
            // redundant in-app Basic Auth form. Do NOT fetch /api/settings here;
            // a 401 + WWW-Authenticate makes the browser show a native dialog.
            if (/\.heiyu\.space$/i.test(window.location.hostname)) {
              document.querySelectorAll('form').forEach((f) => {
                if (/password|sign.?in|admin/i.test(f.textContent || '')) f.remove();
              });
            }
    - id: subwave-operator-nav
      on: browser
      when:
        - /*
        - /listen*
      do:
        - src: file:///lzcapp/pkg/content/lazycat-operator-nav.js

services:
  caddy:
    image: ghcr.io/perminder-klair/subwave-caddy:latest
    depends_on:
      - web
      - controller
      - broadcast

  broadcast:
    image: ghcr.io/perminder-klair/subwave-broadcast:latest
    environment:
      - TZ=Asia/Shanghai
    binds:
      - /lzcapp/var/subwave:/var/sub-wave
      - /lzcapp/var/subwave/logs:/var/log/liquidsoap
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:7702/status-json.xsl > /dev/null']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  controller:
    image: ghcr.io/perminder-klair/subwave-controller:latest
    depends_on:
      - broadcast
    environment:
      - NODE_ENV=production
      - ADMIN_USER=admin
      - ADMIN_PASS=025676
      - SUBWAVE_TRUST_LAZYCAT_AUTH=true
      - TZ=Asia/Shanghai
      - STATE_DIR=/var/sub-wave
      - SOUNDS_DIR=/sounds
    binds:
      - /lzcapp/var/subwave:/var/sub-wave

  web:
    image: ghcr.io/perminder-klair/subwave-web:latest
    depends_on:
      - controller
    environment:
      - NODE_ENV=production
      - SUBWAVE_HOMEPAGE=player
      - SITE_URL=https://${LAZYCAT_APP_DOMAIN}
      - CONTROLLER_INTERNAL_URL=http://controller:7701
