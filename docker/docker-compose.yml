# SUB/WAVE — orchestration (Mac local smoke-test variant)
# Runs: Icecast (broadcast) → Liquidsoap (mixer) → Controller (brain)
# Web UI runs separately (next.js dev/prod)
#
# Navidrome and Ollama are reached over the network (see controller/.env).

services:
  # -------------------------------------------------------------------------
  # ICECAST — the broadcast endpoint listeners connect to
  # -------------------------------------------------------------------------
  icecast:
    image: moul/icecast:latest
    container_name: sub-wave-icecast
    restart: unless-stopped
    ports:
      - "7702:7702"
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-changeme}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:-changeme}
      - ICECAST_PASSWORD=${ICECAST_RELAY_PASSWORD:-changeme}
      - ICECAST_HOSTNAME=localhost
    volumes:
      # Rendered by scripts/setup.sh from icecast.xml.template — keeps secrets
      # out of the repo and lets the moul/icecast entrypoint's sed run cleanly.
      - ../state/icecast.xml:/etc/icecast2/icecast.xml:ro

  # -------------------------------------------------------------------------
  # LIQUIDSOAP — pulls from queue file, broadcasts to Icecast
  # -------------------------------------------------------------------------
  liquidsoap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.liquidsoap
    image: sub-wave-liquidsoap:local
    container_name: sub-wave-liquidsoap
    restart: unless-stopped
    depends_on:
      - icecast
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-changeme}
      - TZ=${TZ:-Europe/London}
    extra_hosts:
      # Lets Liquidsoap fetch Subsonic stream URLs that point at host services
      # (e.g. NAVIDROME_URL=http://host.docker.internal:4533) without leaking
      # the lookup to public DNS.
      - "host.docker.internal:host-gateway"
    volumes:
      - ../liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ../state:/var/sub-wave
      - ../state/logs:/var/log/liquidsoap
    command: liquidsoap /etc/liquidsoap/radio.liq

  # -------------------------------------------------------------------------
  # CONTROLLER — the AI DJ brain
  # -------------------------------------------------------------------------
  controller:
    build:
      context: ..
      dockerfile: docker/Dockerfile.controller
    platform: linux/amd64
    container_name: sub-wave-controller
    restart: unless-stopped
    environment:
      # Without TZ the container runs in UTC; schedule slots (day-of-week +
      # hour) would then resolve an hour off from the admin UI during BST.
      - TZ=${TZ:-Europe/London}
    depends_on:
      - liquidsoap
    ports:
      - "7701:7701"
    env_file:
      - ../controller/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../state:/var/sub-wave
      - ../state/logs:/var/log/liquidsoap:ro
