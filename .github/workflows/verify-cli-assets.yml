name: Verify CLI assets

# Catches stale cli/src/assets.generated.ts. If a contributor edits one of
# the source compose files but forgets to run `npm --prefix cli run
# embed-assets`, the committed copy drifts and `subwave init` materialises
# the wrong content until the next tag push. This workflow regenerates the
# file in CI and diffs it against the committed version. Pure check —
# never writes back.

on:
  pull_request:
    paths:
      - "docker-compose.yml"
      - "docker-compose.byo.yml"
      - "docker-compose.dev.yml"
      - ".env.example"
      - "cli/src/assets.generated.ts"
      - "cli/scripts/embed-assets.ts"
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "docker-compose.byo.yml"
      - "docker-compose.dev.yml"
      - ".env.example"
      - "cli/src/assets.generated.ts"
      - "cli/scripts/embed-assets.ts"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install cli deps
        working-directory: cli
        run: npm install --no-fund --no-audit
      - name: Regenerate embedded assets
        working-directory: cli
        run: npm run embed-assets
      - name: Diff against committed copy
        run: |
          if ! git diff --exit-code -- cli/src/assets.generated.ts; then
            echo "::error::cli/src/assets.generated.ts is out of sync. Run \`npm --prefix cli run embed-assets\` locally and commit the result."
            exit 1
          fi
