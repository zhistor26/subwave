name: Release Please

# release-please watches main for Conventional Commits and maintains a
# "release PR" that bumps the version + CHANGELOG.md. Merging that PR creates
# a v* tag and a GitHub Release, which in turn triggers publish-images.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Explicit target-branch: the action defaults to the repo's default
          # branch when unset, and our default is `develop` (not `main`). Without
          # this, the release PR is opened against `develop` and the version tag
          # never lands on the release branch.
          target-branch: main
          # PAT (not GITHUB_TOKEN) so the tag push triggers publish-images.yml.
          # GitHub suppresses downstream workflow runs for events triggered by
          # GITHUB_TOKEN to prevent loops; a PAT-pushed tag doesn't have that
          # restriction. Falls back to GITHUB_TOKEN if the secret is unset, so
          # the release PR still gets created — just no auto-publish.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
