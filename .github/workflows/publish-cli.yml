name: Publish CLI binaries

# Builds the standalone `subwave` CLI for linux + macOS (x64 + arm64) and
# attaches the binaries to the GitHub Release matching the tag.
#
# Triggers:
#   - push of a tag like v1.2.3 → builds + uploads
#   - manual workflow_dispatch → builds without uploading (smoke test)
#
# The install script at install.sh (served from www.getsubwave.com → raw
# GitHub URL → this repo) downloads the matching binary from the latest
# release, so an operator running `curl www.getsubwave.com | sh` lands on
# whatever this workflow last produced.
#
# Inputs are all matrix-controlled — no user-supplied data flows into
# `run:` steps, so the standard command-injection vectors don't apply.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # for uploading release assets

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset:  subwave-linux-x64
          - target: bun-linux-arm64
            asset:  subwave-linux-arm64
          - target: bun-darwin-x64
            asset:  subwave-darwin-x64
          - target: bun-darwin-arm64
            asset:  subwave-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Refresh embedded assets
        # The embed-assets script regenerates cli/src/assets.generated.ts
        # from the live compose files. The build will pull whatever is
        # checked into the tag — but running this here catches a stale
        # generated file (which the assets-check workflow should also flag
        # on PRs).
        working-directory: cli
        run: |
          bun install --frozen-lockfile || bun install
          bun run scripts/embed-assets.ts

      - name: Compile binary
        working-directory: cli
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          mkdir -p dist
          bun build src/cli.ts \
            --compile \
            --target="$TARGET" \
            --outfile="dist/$ASSET"

      - name: Smoke test
        # Only the linux-x64 binary runs on the GH runner. The others are
        # cross-compiled artifacts we can't exec here; trust bun's compile
        # output for those.
        if: matrix.target == 'bun-linux-x64'
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          chmod +x "cli/dist/$ASSET"
          "cli/dist/$ASSET" --version

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
