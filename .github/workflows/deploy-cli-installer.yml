name: Deploy CLI installer Worker

# Auto-deploys the Cloudflare Worker at cli.getsubwave.com whenever the
# Worker source or its config changes on main. Also picks up refreshes to
# install.sh — the Worker proxies the file from raw.githubusercontent with
# a 5-minute edge cache, and a Wrangler deploy invalidates that cache
# immediately, so an install.sh change ships at deploy time rather than 5
# minutes later.
#
# Required repo secret:
#   CLOUDFLARE_API_TOKEN — scoped to the getsubwave.com zone with
#                          "Workers Scripts: Edit" + "Account Workers
#                          Routes: Edit". Create at:
#                          https://dash.cloudflare.com/profile/api-tokens
#
# Optional secret (only when the account owns multiple zones and Wrangler
# can't infer the right one):
#   CLOUDFLARE_ACCOUNT_ID — visible in the Cloudflare dashboard sidebar.
#
# Security: no untrusted input flows into `run:` steps; secrets are
# consumed by the action via its own inputs, never expanded inline. The
# Worker itself has no bindings, so a compromised deploy can't exfiltrate
# anything stored on Cloudflare.

on:
  push:
    branches: [main]
    paths:
      - "infra/cli-installer/**"
      - "install.sh"
      - ".github/workflows/deploy-cli-installer.yml"
  workflow_dispatch:

permissions:
  contents: read

# Single in-flight deploy at a time. If two pushes land back-to-back, we
# cancel the older run so the newest source always wins.
concurrency:
  group: deploy-cli-installer
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          # Pin Wrangler so a deploy on a quiet day doesn't break because
          # of an upstream CLI change. Bump deliberately.
          wranglerVersion: "4.30.0"
          workingDirectory: infra/cli-installer
          command: deploy
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test the live endpoint
        env:
          INSTALLER_URL: https://cli.getsubwave.com
        run: |
          # Programmatic request: should return a shell script starting with #!
          BODY="$(curl -fsSL --retry 3 --max-time 15 "$INSTALLER_URL" | head -1)"
          case "$BODY" in
            "#!"*) echo "OK — installer returns: $BODY" ;;
            *) echo "::error::installer did not return a shell script. First line: $BODY"; exit 1 ;;
          esac

          # Browser-style request: should 302 to the docs page.
          REDIRECT="$(curl -sSI --retry 3 --max-time 15 \
            -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36' \
            "$INSTALLER_URL" | awk '/^location:/ {print $2}' | tr -d '\r')"
          case "$REDIRECT" in
            https://www.getsubwave.com/setup/quick-start*) echo "OK — browser redirect: $REDIRECT" ;;
            "") echo "::warning::browser request did not receive a redirect (Worker may still be propagating)" ;;
            *) echo "::warning::unexpected browser redirect target: $REDIRECT" ;;
          esac
