# Cloudflare Worker config for the CLI installer at cli.getsubwave.com.
#
# Deploy from this directory:
#   cd infra/cli-installer
#   npx wrangler@latest login            # one-time, opens browser to auth
#   npx wrangler@latest deploy           # uploads worker.js
#
# Or wire it into CI later; nothing here needs secrets, so a `deploy on
# push to main when infra/cli-installer/** changes` workflow is safe.

name = "subwave-cli-installer"
main = "worker.js"

# Cloudflare's worker runtime version. Pin a date to avoid surprise breakage
# from a runtime upgrade; bump deliberately when migrating.
compatibility_date = "2026-04-01"

# Route the cli.getsubwave.com hostname through this worker. The zone must
# already exist on the Cloudflare account (the apex getsubwave.com one).
# A "*" catches every path; we filter inside the worker itself.
routes = [
  { pattern = "cli.getsubwave.com/*", zone_name = "getsubwave.com" }
]

# No KV / D1 / R2 bindings — the worker just proxies a GitHub raw URL with
# edge caching. If we ever add install-telemetry or version pinning, this is
# where the binding declarations go.
